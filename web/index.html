<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="المدار الطبي - دليل الأطباء والعيادات في العراق">

  <!-- PWA / mobile -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="المدار الطبي">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>المدار الطبي</title>
  <link rel="manifest" href="manifest.json">

</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    var _pwaPrompt = null;

    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      _pwaPrompt = e;
    });

    // Returns true if native install prompt was shown, false if not available.
    function pwaInstall() {
      if (!_pwaPrompt) return false;
      _pwaPrompt.prompt();
      _pwaPrompt.userChoice.then(function () { _pwaPrompt = null; });
      return true;
    }
  </script>
</body>
</html>
