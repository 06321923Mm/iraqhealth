name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

# Required when the repo uses restricted default workflow permissions: gh-pages deploy pushes a branch.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Supabase env file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          # Only overwrite the committed flutter.env when secrets are available.
          # Without this guard, an unset secret produces an empty file and
          # Supabase initialises with blank credentials, breaking login.
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n\n' \
              "$SUPABASE_URL" "$SUPABASE_ANON_KEY" > assets/env/flutter.env
            cat assets/env/flutter.env.example >> assets/env/flutter.env
          fi

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: |
          flutter build web --release --base-href "/" \
            --dart-define=OAUTH_REDIRECT_URL=https://iraqhealth.net/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          cname: iraqhealth.net
