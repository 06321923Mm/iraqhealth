<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iraq Health | دليل أطباء البصرة</title>
    <style>
        :root { --primary: #1a7a3c; --dark: #0f1117; --card: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: #eee; }
        .header { background: linear-gradient(135deg, var(--primary), #0f5c2c); color: white; padding: 20px; text-align: center; }
        .search-container { padding: 15px; position: sticky; top: 0; background: var(--dark); z-index: 100; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: var(--card); color: white; }
        #doctorsList { padding: 15px; }
        .doctor-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-right: 5px solid var(--primary); }
        .doctor-name { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .doctor-spec { color: var(--primary); font-size: 0.9rem; margin: 5px 0; }
        .card-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
        .btn-call { background: #2196F3; color: white; }
        .btn-wa { background: #25D366; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>Iraq Health 🏥</h1>
    <p>دليل أطباء البصرة</p>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="ابحث باسم الطبيب..." oninput="filterDoctors()">
    <div class="filter-grid">
        <select id="areaFilter" onchange="filterDoctors()">
            <option value="">كل المناطق</option>
            <option value="بريهة">بريهة</option>
            <option value="العباسية">العباسية</option>
            <option value="الجزائر">الجزائر</option>
            <option value="العشار">العشار</option>
            <option value="الزبير">الزبير</option>
            <option value="الجنينة">الجنينة</option>
        </select>
        <select id="specFilter" onchange="filterDoctors()">
            <option value="">كل التخصصات</option>
            <option value="الأسنان">الأسنان</option>
            <option value="الأطفال">الأطفال</option>
            <option value="النسائية">النسائية</option>
            <option value="الباطنية والصدرية والقلبية">باطنية وقلبية</option>
        </select>
    </div>
</div>

<div id="doctorsList">جاري تحميل الأطباء...</div>

<script>
    // هذه المعلومات من الصورة التي أرسلتها أنت
    const SUPABASE_URL = "https://kxyjlpvdyonytmptabpk.supabase.co";
    const SUPABASE_KEY = ""eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5Z3VqZWJuZ2l3ZW13dWpqY2dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Njg1MjAsImV4cCI6MjA5MTM0NDUyMH0.p9hhJZ8L45ZqwQKuq5TCPWEa2xxBNl0AqHPQUjP1Xvs;

    let allDoctors = [];

    async function fetchDoctors() {
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/doctors?select=*`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            allDoctors = await response.json();
            renderList(allDoctors);
        } catch (e) {
            document.getElementById('doctorsList').innerHTML = "حدث خطأ في جلب البيانات. تأكد من إعدادات Supabase.";
        }
    }

    function renderList(list) {
        const container = document.getElementById('doctorsList');
        if (list.length === 0) { container.innerHTML = "لا توجد نتائج"; return; }
        container.innerHTML = list.map(doc => `
            <div class="doctor-card">
                <div class="doctor-name">${doc.name}</div>
                <div class="doctor-spec">${doc.spec}</div>
                <div style="font-size:0.8rem; color:#bbb;">📍 ${doc.area || ''} - ${doc.addr || ''}</div>
                <div class="card-btns">
                    <a href="tel:${doc.ph}" class="btn btn-call">اتصال</a>
                    <button onclick="openWA('${doc.ph}')" class="btn btn-wa">واتساب</button>
                </div>
            </div>
        `).join('');
    }

    function openWA(phone) {
        let clean = phone.toString().replace(/\D/g, '');
        if (clean.startsWith('0')) clean = '964' + clean.substring(1);
        window.open(`https://wa.me/${clean}?text=${encodeURIComponent("مرحباً دكتور، أود الاستفسار من تطبيق Iraq Health")}`, '_blank');
    }

    function filterDoctors() {
        const nameQ = document.getElementById('searchInput').value.toLowerCase();
        const areaQ = document.getElementById('areaFilter').value;
        const specQ = document.getElementById('specFilter').value;
        const filtered = allDoctors.filter(d => 
            d.name.toLowerCase().includes(nameQ) &&
            (areaQ === "" || d.area === areaQ) &&
            (specQ === "" || d.spec === specQ)
        );
        renderList(filtered);
    }

    fetchDoctors();
</script>
</body>
</html>
