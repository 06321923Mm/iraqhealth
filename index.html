const COLORS = [
  {bg:"#e8f5e9",badge:"#2e7d32",em:"🫀"},
  {bg:"#e3f2fd",badge:"#1565c0",em:"🧠"},
  {bg:"#fce4ec",badge:"#c62828",em:"🦷"},
  {bg:"#fff3e0",badge:"#e65100",em:"👁️"},
  {bg:"#f3e5f5",badge:"#6a1b9a",em:"🦴"},
  {bg:"#e0f7fa",badge:"#00695c",em:"🫁"},
  {bg:"#fafafa",badge:"#424242",em:"💊"},
  {bg:"#fff8e1",badge:"#f57f17",em:"🩺"},
  {bg:"#e8eaf6",badge:"#283593",em:"🔬"},
  {bg:"#fbe9e7",badge:"#bf360c",em:"🧬"},
  {bg:"#e0f2f1",badge:"#004d40",em:"👶"},
  {bg:"#ede7f6",badge:"#4527a0",em:"🧪"},
];
const specColorMap = {};
function getColor(spec) {
  if (!specColorMap[spec]) {
    const idx = Object.keys(specColorMap).length % COLORS.length;
    specColorMap[spec] = COLORS[idx];
  }
  return specColorMap[spec];
}

let activeFilter = "الكل";
let currentPage = 0;
const PAGE_SIZE = 30;
let filteredDocs = [];

function buildFilters() {
  const specs = ["الكل", ...new Set(allDoctors.map(d => d.spec).filter(Boolean))];
  document.getElementById("filtersWrap").innerHTML = specs.map(s => {
    return `<button class="filter-btn ${s==='الكل'?'active':''}" onclick="setFilter('${s.replace(/'/g,"\'")}')"> ${s}</button>`;
  }).join('');
}

function setFilter(spec) {
  activeFilter = spec;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === spec || (spec==='الكل' && b.textContent.trim()==='الكل'));
  });
  filterDocs();
}

function filterDocs() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  filteredDocs = allDoctors;
  if (activeFilter !== "الكل") filteredDocs = filteredDocs.filter(d => d.spec === activeFilter);
  if (q) filteredDocs = filteredDocs.filter(d =>
    (d.name||"").toLowerCase().includes(q) ||
    (d.spec||"").toLowerCase().includes(q) ||
    (d.area||"").toLowerCase().includes(q) ||
    (d.addr||"").toLowerCase().includes(q)
  );
  currentPage = 0;
  document.getElementById("shownCount").textContent = filteredDocs.length;
  renderPage();
}

function renderPage() {
  const end = (currentPage + 1) * PAGE_SIZE;
  const data = filteredDocs.slice(0, end);
  const container = document.getElementById("cardsWrap");
  if (filteredDocs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="ei">🔍</div><p>لا توجد نتائج</p></div>`;
    return;
  }
  container.innerHTML = data.map(d => {
    const idx = allDoctors.indexOf(d);
    const c = getColor(d.spec);
    return `
    <div class="card" onclick="openSheet(${idx})">
      <div class="card-body">
        <div class="avatar" style="background:${c.bg}">${c.em}</div>
        <div class="card-info">
          <div class="doc-name">${d.name || '—'}</div>
          <span class="spec-badge" style="background:${c.bg};color:${c.badge}">${d.spec}</span>
          ${d.addr ? `<div class="doc-addr">${d.addr}</div>` : ''}
          ${d.area ? `<span class="area-pill">📍 ${d.area}</span>` : ''}
          ${d.notes ? `<br><span class="notes-pill">⏰ ${d.notes}</span>` : ''}
        </div>
      </div>
      <div class="card-footer">
        <button class="foot-btn green" onclick="event.stopPropagation();window.location='tel:${d.ph}'">
          <span class="foot-icon">📞</span>اتصال
        </button>
        <button class="foot-btn teal" onclick="event.stopPropagation();window.open('https://wa.me/964${(d.ph||"").replace(/^0/,"")}')" >
          <span class="foot-icon">💬</span>واتساب
        </button>
        <button class="foot-btn red" onclick="event.stopPropagation();window.open('https://maps.google.com/?q=${encodeURIComponent((d.addr||"") + " البصرة العراق")}')">
          <span class="foot-icon">📍</span>الموقع
        </button>
      </div>
    </div>`;
  }).join('');
  if (end < filteredDocs.length) {
    container.innerHTML += `<button onclick="loadMore()" style="width:100%;padding:14px;background:#1a7a3c;color:white;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">تحميل المزيد (${filteredDocs.length - end} متبقي)</button>`;
  }
}

function loadMore() { currentPage++; renderPage(); }

function openSheet(idx) {
  const d = allDoctors[idx];
  const c = getColor(d.spec);
  document.getElementById("sheetContent").innerHTML = `
    <div class="sheet-header">
      <div class="sheet-avatar">${c.em}</div>
      <div><div class="sheet-name">${d.name || '—'}</div><div class="sheet-spec">${d.spec}</div></div>
    </div>
    <div class="sheet-body">
      <div class="info-group">
        <div class="info-group-title">التواصل</div>
        ${d.ph ? `<div class="info-item"><span class="ic">📞</span>${d.ph}</div>` : ''}
        ${d.ph2 ? `<div class="info-item"><span class="ic">📞</span>${d.ph2}</div>` : ''}
      </div>
      ${d.addr ? `<div class="info-group"><div class="info-group-title">الموقع</div><div class="info-item"><span class="ic">📍</span>${d.addr}</div>${d.area ? `<div class="info-item"><span class="ic">🏙️</span>منطقة ${d.area}</div>` : ''}</div>` : ''}
      ${d.notes ? `<div class="info-group"><div class="info-group-title">ملاحظات</div><div class="info-item"><span class="ic">ℹ️</span>${d.notes}</div></div>` : ''}
    </div>
    <div class="sheet-btns">
      ${d.ph ? `<button class="sheet-btn btn-g" onclick="window.location='tel:${d.ph}'">📞 اتصال الآن</button>` : ''}
      ${d.ph ? `<button class="sheet-btn btn-w" onclick="window.open('https://wa.me/964${(d.ph||"").replace(/^0/,"")}')">💬 واتساب</button>` : ''}
    </div>`;
  document.getElementById("overlay").classList.add("show");
}

function closeSheet(e) {
  if (e.target === document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("show");
}

function navClick(btn, page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (page === 'search') {
    document.getElementById('searchInput').focus();
    window.scrollTo({top: 0, behavior: 'smooth'});
  } else if (page === 'book') {
    alert('ميزة الحجز قريباً!');
  } else if (page === 'profile') {
    alert('ميزة الحساب قريباً!');
  }
}

// Init
buildFilters();
const specs = new Set(allDoctors.map(d => d.spec).filter(Boolean));
const areas = new Set(allDoctors.map(d => d.area).filter(Boolean));
document.getElementById("totalStat").textContent = allDoctors.length.toLocaleString();
document.getElementById("specStat").textContent = specs.size;
document.getElementById("areaStat").textContent = areas.size;
filteredDocs = allDoctors;
document.getElementById("shownCount").textContent = filteredDocs.length;
renderPage();
</script>
