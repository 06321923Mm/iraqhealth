async function uploadAll() {
  const status = document.getElementById('status');
  const btn = document.querySelector('button');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الرفع...';
  
  const chunkSize = 50;
  let uploaded = 0;
  let errors = 0;
  
  for (let i = 0; i < doctors.length; i += chunkSize) {
    const chunk = doctors.slice(i, i + chunkSize);
    
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/doctors`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(chunk)
      });
      
      if (res.ok) {
        uploaded += chunk.length;
        status.innerHTML = `<span class="success">✅ تم رفع ${uploaded} طبيب...</span>`;
      } else {
        const err = await res.text();
        errors++;
        status.innerHTML += `<br><span class="error">❌ خطأ: ${err}</span>`;
      }
    } catch(e) {
      errors++;
      status.innerHTML += `<br><span class="error">❌ ${e.message}</span>`;
    }
    
    await new Promise(r => setTimeout(r, 200));
  }
  
  if (errors === 0) {
    status.innerHTML = `<span class="success">🎉 تم رفع ${uploaded} طبيب بنجاح!</span>`;
    btn.textContent = '✅ تم!';
  } else {
    status.innerHTML += `<br><span class="error">انتهى مع ${errors} أخطاء</span>`;
    btn.textContent = '⚠️ انتهى مع أخطاء';
  }
}
